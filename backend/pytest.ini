[pytest]
# Pytest configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --cov-fail-under=70

# Test markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow (deselect with '-m "not slow"')

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 300

# Test paths
testpaths = tests

# Python path
pythonpath = .

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info .pytest_cache
